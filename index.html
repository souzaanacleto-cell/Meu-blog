Hoje vou mostrar uma receita que vocês podem ter certeza que é muito perfeita, mas pode ser enjoativo para muitos, principalmente para quem não gosta de doce. Vou ensinar para vocês o famoso bolo de tapioca com a cobertura de leite condensado!
Vamos começar colocando os ingredientes como:
350 gramas de tapioca granulada
800 ml de leite integral quente
1 caixa e meia de leite condensado
200 ml de leite de coco
50 gramas de coco ralado (seco ou em flocos)
½ xícara de leite em pó
E por mim vamos misturar tudo e untar uma forma com óleo, assim vamos despejar tudo após mexer toda a massa dentro da forma untada. Depois disso vamos cobrir com plástico-filme e por na geladeira, depois que estiver firme o suficiente é só desenformar e jogar o leite condensado por cima, então por fim apreciar!
